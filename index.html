<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bithika Das — Product Leader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f6;
  --bg2:#f3f1ec;
  --bg3:#ffffff;
  --bg4:#f7f5f0;

  --text:#111111;
  --text2:#4b4b4b;
  --text3:#8a8a8a;

  --gold:#c6a86b;
  --gold2:#e6cfa3;

  --teal:#2fa58d;

  --border:rgba(0,0,0,0.06);
  --border2:rgba(198,168,107,0.25);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  line-height:1.6
}

body::after{opacity:.08}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:800;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 64px;
  background:rgba(250,249,246,0.75);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.04);
}

.nav-logo{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--gold);text-decoration:none}
.nav-logo span{color:var(--text);font-weight:300}

.nav-links{display:flex;gap:34px;list-style:none}
.nav-links a{font-size:11px;color:var(--text2);text-decoration:none;letter-spacing:2px;text-transform:uppercase}
.nav-links a:hover{color:#111}

.nav-cta{
  font-size:11.5px;
  color:#fff;
  background:#111;
  padding:9px 22px;
  border-radius:2px;
  text-decoration:none
}
.nav-cta:hover{background:#333}

/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;padding:130px 64px 80px}

.grid-lines{display:none}

.hero-inner{max-width:860px}

.hero-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(62px,9vw,110px);
  letter-spacing:-1px;
}

.hero-role{color:var(--text2)}
.hero-desc{color:#555}

.btn-p{
  background:#111;
  color:#fff;
  padding:15px 36px;
  text-decoration:none
}
.btn-p:hover{background:#333}

.btn-s{
  border:1px solid rgba(0,0,0,0.1);
  color:var(--text);
  padding:15px 36px;
  text-decoration:none
}
.btn-s:hover{background:#111;color:#fff}

/* SECTIONS */
section{padding:110px 64px}

.sec-title{letter-spacing:-1px}
.sec-sub{color:#555}

#vision,#work,#blog{background:var(--bg2)}

/* CARDS */
.vc,.ct,.sg,.bc,.wci{
  border:1px solid rgba(0,0,0,0.04);
  box-shadow:0 10px 30px rgba(0,0,0,0.04);
}

.wc-kpis{
  background:rgba(0,0,0,0.04);
}

.stat .n{
  color:#111;
}

/* FOOTER */
footer{
  background:var(--bg2);
  border-top:1px solid var(--border);
}

@media(max-width:900px){
  nav{padding:14px 24px}
  #hero,section{padding:100px 24px 80px}
}
</style>
</head>
<body>

<!-- KEEP REST OF YOUR HTML SAME -->

</body>
</html>
